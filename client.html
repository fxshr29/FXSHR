<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Projektübersicht — Felix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080a; --bg-soft: #0d0d10;
      --surface: rgba(255,255,255,.025); --surface-2: rgba(255,255,255,.045);
      --border: rgba(255,255,255,.09); --border-2: rgba(255,255,255,.16);
      --text: #f4f4f1; --muted: #86868b; --muted-2: #56565c;
      --accent: #c8b9ff; --green: #6ee7a8; --red: #f87171;
      --sans: 'Inter', sans-serif; --serif: 'Instrument Serif', serif; --mono: 'JetBrains Mono', monospace;
      --ease: cubic-bezier(.22,1,.36,1);
      --pad: clamp(18px, 4vw, 48px);
    }
    html { -webkit-font-smoothing: antialiased; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* Header */
    .client-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px var(--pad);
      background: rgba(8,8,10,.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .client-logo { font-family: var(--serif); font-size: 1.4rem; }
    .client-logo .brand-dot { color: var(--accent); }
    .client-logout {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 50px;
      border: 1px solid var(--border-2); background: none;
      color: var(--muted); font-family: var(--sans); font-size: .82rem;
      cursor: pointer; transition: color .3s var(--ease), border-color .3s var(--ease);
    }
    .client-logout:hover { color: var(--text); border-color: var(--text); }

    /* Main */
    .client-main {
      max-width: 820px;
      margin: 0 auto;
      padding: clamp(36px, 6vw, 72px) var(--pad) 80px;
    }

    .client-welcome {
      margin-bottom: 48px;
    }
    .welcome-eyebrow {
      font-family: var(--mono); font-size: .7rem;
      text-transform: uppercase; letter-spacing: .14em; color: var(--muted-2);
      margin-bottom: 12px;
    }
    .welcome-eyebrow::before { content: '— '; color: var(--accent); }
    .welcome-title {
      font-family: var(--serif); font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 400; letter-spacing: -.02em; line-height: 1.05;
      margin-bottom: 14px;
    }
    .welcome-title em { font-style: italic; color: var(--accent); }
    .welcome-text { font-size: .95rem; color: var(--muted); max-width: 520px; line-height: 1.7; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 30px;
      margin-bottom: 20px;
    }
    .card-head {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 24px;
    }
    .card-eyebrow {
      font-family: var(--mono); font-size: .68rem;
      text-transform: uppercase; letter-spacing: .12em; color: var(--muted-2);
    }
    .card-title {
      font-family: var(--serif); font-size: 1.35rem;
      font-weight: 400; color: var(--text);
    }

    /* Stages */
    .stages {
      display: flex;
      gap: 0;
      position: relative;
    }
    .stages::before {
      content: '';
      position: absolute;
      top: 20px; left: 20px; right: 20px;
      height: 1px;
      background: var(--border);
      z-index: 0;
    }
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .stage-dot {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border-2);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: .7rem;
      color: var(--muted-2);
      transition: all .3s var(--ease);
    }
    .stage.done .stage-dot {
      background: rgba(110,231,168,.15);
      border-color: var(--green);
      color: var(--green);
    }
    .stage.current .stage-dot {
      background: rgba(200,185,255,.12);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 4px rgba(200,185,255,.12);
    }
    .stage-label {
      font-size: .74rem;
      color: var(--muted-2);
      text-align: center;
      font-family: var(--mono);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .stage.done .stage-label, .stage.current .stage-label { color: var(--text); }

    /* Updates */
    .updates-list { display: flex; flex-direction: column; gap: 14px; }
    .update-item {
      padding: 16px 20px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .update-date {
      font-family: var(--mono); font-size: .68rem;
      color: var(--muted-2); text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 6px;
    }
    .update-text { font-size: .9rem; color: var(--text); line-height: 1.6; }
    .empty-state {
      padding: 24px 20px; text-align: center;
      font-size: .88rem; color: var(--muted-2);
      font-family: var(--mono);
    }

    /* Documents */
    .docs-list { display: flex; flex-direction: column; gap: 10px; }
    .doc-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-radius: 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      transition: border-color .3s var(--ease), background .3s var(--ease);
    }
    .doc-item:hover { border-color: var(--border-2); background: rgba(255,255,255,.04); }
    .doc-name { font-size: .9rem; color: var(--text); }
    .doc-link {
      font-family: var(--mono); font-size: .72rem; color: var(--accent);
      text-transform: uppercase; letter-spacing: .06em;
    }

    /* Contact card */
    .contact-card {
      background: linear-gradient(160deg, rgba(200,185,255,.06) 0%, rgba(200,185,255,.02) 100%);
      border: 1px solid rgba(200,185,255,.25);
      border-radius: 18px;
      padding: 28px 30px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 20px;
    }
    .cc-text h3 { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 4px; }
    .cc-text p { font-size: .88rem; color: var(--muted); }
    .cc-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 50px;
      background: var(--text); color: var(--bg);
      font-family: var(--sans); font-size: .88rem; font-weight: 500;
      transition: background .3s var(--ease), transform .2s var(--ease);
    }
    .cc-btn:hover { background: #fff; transform: translateY(-1px); }

    /* Loading */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted-2); font-family: var(--mono); font-size: .8rem; }

    @media (max-width: 600px) {
      .stage-label { font-size: .58rem; }
      .stages::before { top: 16px; left: 16px; right: 16px; }
      .stage-dot { width: 32px; height: 32px; font-size: .62rem; }
    }
  </style>
</head>
<body>

<header class="client-header">
  <a href="index.html" class="client-logo">Felix<span class="brand-dot">.</span></a>
  <button class="client-logout" id="logoutBtn">Abmelden</button>
</header>

<main class="client-main" id="clientMain">
  <div class="loading">Lade Projektdaten…</div>
</main>

<script>
'use strict';

function checkAuth() {
  try {
    const { expires } = JSON.parse(sessionStorage.getItem('client_session') || '{}');
    return Date.now() < expires;
  } catch { return false; }
}

if (!checkAuth()) {
  location.href = 'login.html';
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('client_session');
  location.href = 'login.html';
});

(async function render() {
  let data = null;
  try {
    const res = await fetch('content.json', { cache: 'no-store' });
    if (res.ok) data = await res.json();
  } catch {}

  const c = data?.client || {};
  const project = c.project || {};
  const stages = project.stages || [];
  const updates = c.updates || [];
  const documents = c.documents || [];
  const projectName = project.name || 'Dein Projekt';

  const main = document.getElementById('clientMain');
  main.innerHTML = `
    <div class="client-welcome">
      <div class="welcome-eyebrow">Client Portal</div>
      <h1 class="welcome-title"><em>${projectName}</em></h1>
      <p class="welcome-text">${c.welcome || 'Willkommen! Hier findest du alle Infos zu deinem Projekt.'}</p>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-eyebrow">Status</span>
        <span class="card-title">Projektstatus</span>
      </div>
      <div class="stages">
        ${stages.map((s, i) => `
          <div class="stage${s.done ? ' done' : ''}${s.current ? ' current' : ''}">
            <div class="stage-dot">${s.done ? '✓' : (i + 1)}</div>
            <div class="stage-label">${s.label}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-eyebrow">Updates</span>
        <span class="card-title">Neuigkeiten</span>
      </div>
      <div class="updates-list">
        ${updates.length
          ? updates.slice().reverse().map(u => `
            <div class="update-item">
              <div class="update-date">${u.date || ''}</div>
              <div class="update-text">${u.text || ''}</div>
            </div>`).join('')
          : '<div class="empty-state">Noch keine Updates — halte Ausschau!</div>'
        }
      </div>
    </div>

    ${documents.length ? `
    <div class="card">
      <div class="card-head">
        <span class="card-eyebrow">Dateien</span>
        <span class="card-title">Dokumente</span>
      </div>
      <div class="docs-list">
        ${documents.map(d => `
          <div class="doc-item">
            <span class="doc-name">${d.name || ''}</span>
            <a href="${d.url || '#'}" class="doc-link" target="_blank" rel="noopener">Öffnen →</a>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <div class="contact-card">
      <div class="cc-text">
        <h3>Fragen zum Projekt?</h3>
        <p>Ich bin erreichbar und freue mich von dir zu hören.</p>
      </div>
      <a href="mailto:fxshr@yahoo.com" class="cc-btn">E-Mail schreiben →</a>
    </div>
  `;
})();
</script>
</body>
</html>
