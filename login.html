<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Client Portal — Felix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080a; --surface: rgba(255,255,255,.03); --surface-2: rgba(255,255,255,.055);
      --border: rgba(255,255,255,.09); --border-2: rgba(255,255,255,.18);
      --text: #f4f4f1; --muted: #86868b; --muted-2: #56565c;
      --accent: #c8b9ff; --red: #f87171; --green: #6ee7a8;
      --sans: 'Inter', sans-serif; --serif: 'Instrument Serif', serif; --mono: 'JetBrains Mono', monospace;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap { width: 100%; max-width: 400px; }

    .login-logo {
      font-family: var(--serif);
      font-size: 1.8rem;
      margin-bottom: 40px;
      text-align: center;
    }
    .brand-dot { color: var(--accent); }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
    }

    .login-eyebrow {
      font-family: var(--mono);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted-2);
      margin-bottom: 10px;
    }
    .login-eyebrow::before { content: '— '; color: var(--accent); }

    .login-title {
      font-family: var(--serif);
      font-size: 1.9rem;
      font-weight: 400;
      letter-spacing: -.01em;
      margin-bottom: 8px;
    }
    .login-sub {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .lf { position: relative; margin-bottom: 14px; }
    .lf input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: var(--sans);
      font-size: .95rem;
      outline: none;
      transition: border-color .3s var(--ease), box-shadow .3s var(--ease);
    }
    .lf input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,185,255,.1);
    }
    .lf input::placeholder { color: var(--muted-2); }

    .login-error {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--red);
      margin-bottom: 14px;
      min-height: 20px;
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      font-size: .92rem;
      font-weight: 500;
      background: var(--text);
      color: var(--bg);
      transition: background .3s var(--ease), transform .2s var(--ease);
    }
    .login-btn:hover { background: #fff; transform: translateY(-1px); }
    .login-btn:disabled { opacity: .5; cursor: wait; transform: none; }

    .login-info {
      font-size: .9rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      padding: 12px 0;
    }

    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: .8rem;
      color: var(--muted-2);
    }
    .login-footer a { color: var(--accent); }

    .login-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 28px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">Felix<span class="brand-dot">.</span></div>

  <div class="login-card">
    <div class="login-eyebrow">Sicherheitsbereich</div>
    <div class="login-title">Client Portal</div>
    <div class="login-sub">Dein persönlicher Projektbereich. Melde dich an, um den Projektstatus und Updates einzusehen.</div>

    <div id="loginForm">
      <div class="lf">
        <input type="password" id="loginPwd" placeholder="Passwort" autocomplete="current-password" />
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" id="loginBtn">Einloggen →</button>
    </div>

    <div id="noPortal" style="display:none">
      <p class="login-info">Das Client-Portal wird gerade eingerichtet.<br />Bitte komme später wieder.</p>
    </div>
  </div>

  <div class="login-footer">
    <a href="index.html">← Zurück zur Website</a>
  </div>
</div>

<script>
'use strict';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

(async function init() {
  let contentData = null;
  try {
    const res = await fetch('content.json', { cache: 'no-store' });
    if (res.ok) contentData = await res.json();
  } catch {}

  const storedHash = contentData?.client?.passwordHash || '';
  if (!storedHash) {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('noPortal').style.display = 'block';
    return;
  }

  const pwd    = document.getElementById('loginPwd');
  const btn    = document.getElementById('loginBtn');
  const errEl  = document.getElementById('loginError');

  async function attempt() {
    const val = pwd.value;
    if (!val) return;
    btn.disabled = true;
    btn.textContent = '…';
    const hash = await sha256(val);
    if (hash === storedHash) {
      sessionStorage.setItem('client_session', JSON.stringify({ expires: Date.now() + 86400000 }));
      location.href = 'client.html';
    } else {
      errEl.textContent = 'Falsches Passwort. Bitte versuche es erneut.';
      btn.disabled = false;
      btn.textContent = 'Einloggen →';
      pwd.value = '';
      pwd.focus();
    }
  }

  btn.addEventListener('click', attempt);
  pwd.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  setTimeout(() => pwd.focus(), 100);
})();
</script>
</body>
</html>
